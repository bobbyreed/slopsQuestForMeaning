<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slop's Quest for Meaning</title>
  <link rel="stylesheet" href="/src/styles/base.css" />
  <link rel="stylesheet" href="/src/styles/terminal.css" />
  <link rel="stylesheet" href="/src/styles/auth.css" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1260609255146382"
    crossorigin="anonymous"></script>
</head>
<body>
  <div id="page-wrapper">
    <div id="game-container"></div>
    <div id="ad-below">
      <!-- Replace data-ad-slot with your ad unit ID from the AdSense dashboard -->
      <ins class="adsbygoogle"
        style="display:block"
        data-ad-client="ca-pub-1260609255146382"
        data-ad-slot="REPLACE_WITH_AD_SLOT_ID"
        data-ad-format="auto"
        data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
  </div>
  <!-- Rewarded ad unit — activated programmatically for the "no ads" offer -->
  <ins id="ad-rewarded" class="adsbygoogle"
    style="display:none"
    data-ad-client="ca-pub-1260609255146382"
    data-ad-slot="REPLACE_WITH_REWARDED_AD_SLOT_ID"
    data-ad-format="rewarded"
    data-full-width-responsive="true"></ins>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
